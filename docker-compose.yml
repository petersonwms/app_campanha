version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: app_campanha_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_campanha
    ports:
      - "5435:5432"
    volumes:
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_campanha"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: app_campanha_backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://postgres:postgres@db:5432/app_campanha
      - WHATSAPP_SESSION_DIR=/app/session
    volumes:
      - ./backend/session:/app/session
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: app_campanha_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
